services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://admin:password@db:27017/cirquera?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-change-this-local-dev-secret}
      - SEED_ON_BOOT=${SEED_ON_BOOT:-false}
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
      - db
    volumes:
      - .:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    working_dir: /usr/src/app
    command: npm run dev
    networks:
      - cirquera-net

  db:
    image: mongo:6-jammy
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: cirquera
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - cirquera-net

volumes:
  mongodata:
  backend_node_modules:

networks:
  cirquera-net:
